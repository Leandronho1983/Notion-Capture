<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Kids €">
<title>Kids Expenses</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0c;--surface:#161616;--surface2:#1f1f1f;--border:#282828;--border2:#333;
  --text:#f5f0e8;--muted:#555;--muted2:#888;
  --leandro:#c8f060;--leandro-dim:rgba(200,240,96,0.1);
  --wambui:#f06090;--wambui-dim:rgba(240,96,144,0.1);
  --kes:#60d4c8;--usd:#c8a060;
  --danger:#e05555;--danger-dim:rgba(224,85,85,0.1);
  --success:#50c878;--r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100dvh;overflow-x:hidden}
.nav{position:sticky;top:0;z-index:50;background:rgba(12,12,12,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;height:56px;gap:12px}
.nav-title{font-size:16px;font-weight:700;letter-spacing:-0.02em;flex:1}
.nav-tabs{display:flex;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);padding:3px;gap:2px}
.nav-tab{font-family:'Syne Mono',monospace;font-size:11px;padding:5px 10px;border-radius:4px;border:none;background:none;color:var(--muted2);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.nav-tab.active{background:var(--surface2);color:var(--text)}
.nav-cfg{width:32px;height:32px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--muted2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.nav-cfg.ok{color:var(--success);border-color:var(--success)}
.page{display:none;padding:20px;max-width:500px;margin:0 auto}
.page.active{display:block}
.bal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.bal-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden}
.bal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.bal-card.kes::before{background:var(--kes)}
.bal-card.usd::before{background:var(--usd)}
.bal-cur{font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--muted2);text-transform:uppercase}
.bal-amt{font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1}
.bal-card.kes .bal-amt{color:var(--kes)}
.bal-card.usd .bal-amt{color:var(--usd)}
.bal-who{font-size:11px;line-height:1.4}
.bal-who.owes{color:var(--wambui)}
.bal-who.owed{color:var(--leandro)}
.bal-who.ok{color:var(--success)}
.settle-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:16px;margin-bottom:14px;display:none;flex-direction:column;gap:10px}
.settle-box.show{display:flex}
.slabel{font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2)}
.sopt{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;transition:border-color 0.15s}
.sopt.on{border-color:var(--success)}
.sopt-l{display:flex;align-items:center;gap:10px}
.schk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.15s;flex-shrink:0}
.sopt.on .schk{background:var(--success);border-color:var(--success);color:var(--bg)}
.sopt-txt{font-size:13px}
.sopt-amt{font-family:'Syne Mono',monospace;font-size:12px;color:var(--muted2)}
.sbtn{width:100%;padding:12px;border:none;border-radius:var(--r-sm);background:var(--success);color:var(--bg);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s}
.sbtn:disabled{opacity:0.3;cursor:not-allowed}
.sec-hd{font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.elist{display:flex;flex-direction:column;gap:7px}
.eitem{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);padding:11px 14px;display:flex;align-items:flex-start;gap:10px}
.eitem.settle{border-style:dashed;opacity:0.65}
.edot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.edot.L{background:var(--leandro)}
.edot.W{background:var(--wambui)}
.edot.S{background:var(--muted)}
.ebody{flex:1;min-width:0}
.edesc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.emeta{font-family:'Syne Mono',monospace;font-size:10px;color:var(--muted2);display:flex;gap:8px;flex-wrap:wrap}
.eright{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.eamt{font-family:'Syne Mono',monospace;font-size:13px;font-weight:500}
.etag{font-family:'Syne Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px}
.etag.m{background:var(--danger-dim);color:var(--danger)}
.etag.s{background:var(--surface2);color:var(--muted2)}
.fcard{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:5px}
.fl{font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2)}
.fi{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:'Syne',sans-serif;font-size:15px;padding:11px 13px;width:100%;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
.fi:focus{border-color:var(--muted2)}
.fi::placeholder{color:var(--muted)}
select.fi{cursor:pointer}
select.fi option{background:#1f1f1f}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pb-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pb{padding:11px;border-radius:var(--r-sm);border:1.5px solid var(--border2);background:var(--bg);color:var(--muted2);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:7px}
.pb .d{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all 0.15s}
.pb.L.on{border-color:var(--leandro);color:var(--leandro);background:var(--leandro-dim)}
.pb.L.on .d{background:var(--leandro)}
.pb.W.on{border-color:var(--wambui);color:var(--wambui);background:var(--wambui-dim)}
.pb.W.on .d{background:var(--wambui)}
.tog{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer}
.tog-lbl{font-size:14px;color:var(--muted2)}
.tog-sw{width:38px;height:22px;background:var(--border2);border-radius:100px;position:relative;transition:background 0.2s;flex-shrink:0}
.tog-sw::after{content:'';position:absolute;width:16px;height:16px;background:var(--muted2);border-radius:50%;top:3px;left:3px;transition:all 0.2s}
.tog.on.med .tog-sw{background:var(--danger)}
.tog.on.med .tog-sw::after{transform:translateX(16px);background:#fff}
.tog.on.med .tog-lbl{color:var(--danger)}
.tog.on.set .tog-sw{background:var(--success)}
.tog.on.set .tog-sw::after{transform:translateX(16px);background:#fff}
.tog.on.set .tog-lbl{color:var(--success)}
.split-prev{display:flex;gap:8px;padding:10px 13px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r-sm);font-family:'Syne Mono',monospace;font-size:12px}
.sp-item{flex:1;display:flex;flex-direction:column;gap:2px}
.sp-name{font-size:9px;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase}
.sp-val.L{color:var(--leandro)}
.sp-val.W{color:var(--wambui)}
.sub{width:100%;padding:14px;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--text);color:var(--bg)}
.sub:disabled{opacity:0.3;cursor:not-allowed}
.sub:not(:disabled):active{transform:scale(0.98)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top-color:rgba(0,0,0,0.7);border-radius:50%;animation:spin 0.6s linear infinite;display:none}
.loading .spin{display:block}
.loading .btxt{display:none}
.filt-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filt-row::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:100px;border:1px solid var(--border2);background:var(--surface);color:var(--muted2);font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:0.05em;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.chip.on{border-color:var(--text);color:var(--text);background:var(--surface2)}
.loading-st{padding:40px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.lspin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--muted2);border-radius:50%;animation:spin 0.8s linear infinite}
.ltxt{font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase}
.empty{text-align:center;padding:24px;font-family:'Syne Mono',monospace;font-size:11px;color:var(--muted)}
.more-btn{width:100%;margin-top:10px;padding:11px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--muted2);font-family:'Syne Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s}
.more-btn:hover{color:var(--text)}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 20px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 18px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:all 0.25s;pointer-events:none;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{color:var(--success);border-color:var(--success)}
.toast.err{color:var(--danger);border-color:var(--danger)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:flex-end;z-index:300;backdrop-filter:blur(8px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r) var(--r) 0 0;padding:24px 24px calc(24px + env(safe-area-inset-bottom));width:100%;display:flex;flex-direction:column;gap:14px;max-width:500px;margin:0 auto}
.m-title{font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2)}
.m-desc{font-size:13px;color:var(--muted2);line-height:1.6}
.m-actions{display:flex;gap:10px}
.m-cancel{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:12px;border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer}
.m-save{flex:2;background:var(--text);border:none;color:var(--bg);padding:12px;border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-title">Kids 👧🏻👦🏻</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="goPage('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="goPage('add')">+ Add</button>
    <button class="nav-tab" onclick="goPage('history')">History</button>
  </div>
  <button class="nav-cfg" id="cfgBtn" onclick="openCfg()">⚙</button>
</div>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div class="bal-grid">
    <div class="bal-card kes">
      <div class="bal-cur">KES</div>
      <div class="bal-amt" id="kes-amt">—</div>
      <div class="bal-who" id="kes-who"></div>
    </div>
    <div class="bal-card usd">
      <div class="bal-cur">USD</div>
      <div class="bal-amt" id="usd-amt">—</div>
      <div class="bal-who" id="usd-who"></div>
    </div>
  </div>

  <div class="settle-box" id="settleBox">
    <div class="slabel">Log a settlement</div>
    <div id="settleOpts"></div>
    <button class="sbtn" id="settleBtn" onclick="doSettle()">Confirm settlement</button>
  </div>

  <div class="sec-hd"><span>Recent expenses</span><span id="rcCount"></span></div>
  <div class="elist" id="recentList">
    <div class="loading-st"><div class="lspin"></div><div class="ltxt">Loading</div></div>
  </div>
</div>

<!-- ADD -->
<div class="page" id="page-add">
  <div class="fcard">
    <div class="field">
      <label class="fl">Description</label>
      <input type="text" class="fi" id="f-desc" placeholder="What was this for…">
    </div>
    <div class="frow">
      <div class="field">
        <label class="fl">Date</label>
        <input type="date" class="fi" id="f-date">
      </div>
      <div class="field">
        <label class="fl">Currency</label>
        <select class="fi" id="f-cur"><option value="KES">KES</option><option value="USD">USD</option></select>
      </div>
    </div>
    <div class="field">
      <label class="fl">Amount</label>
      <input type="number" class="fi" id="f-amt" placeholder="0.00" step="0.01" inputmode="decimal">
    </div>
    <div class="field">
      <label class="fl">Paid by</label>
      <div class="pb-row">
        <button class="pb L on" id="pb-L" onclick="setPB('Leandro')"><span class="d"></span> Leandro</button>
        <button class="pb W" id="pb-W" onclick="setPB('Wambui')"><span class="d"></span> Wambui</button>
      </div>
    </div>
    <div class="field">
      <label class="fl">Payment type</label>
      <select class="fi" id="f-type">
        <option>MPESA</option><option>Card</option><option>Cash</option><option>Transfer</option>
      </select>
    </div>
    <div class="field">
      <label class="fl">Medical?</label>
      <div class="tog med" id="tog-med" onclick="togField('med')">
        <span class="tog-lbl">No — standard 50/50 split</span>
        <div class="tog-sw"></div>
      </div>
    </div>
    <div class="field">
      <label class="fl">Settlement?</label>
      <div class="tog set" id="tog-set" onclick="togField('set')">
        <span class="tog-lbl">No</span>
        <div class="tog-sw"></div>
      </div>
    </div>
    <div class="field">
      <label class="fl">Split preview</label>
      <div class="split-prev">
        <div class="sp-item"><div class="sp-name">Wambui share</div><div class="sp-val W" id="sp-w">50%</div></div>
        <div class="sp-item"><div class="sp-name">Leandro share</div><div class="sp-val L" id="sp-l">0%</div></div>
      </div>
    </div>
  </div>
  <button class="sub" id="subBtn" onclick="submitExp()">
    <div class="spin"></div><span class="btxt">Add Expense</span>
  </button>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="filt-row">
    <button class="chip on" onclick="setFilt('all',this)">All</button>
    <button class="chip" onclick="setFilt('L',this)">Leandro</button>
    <button class="chip" onclick="setFilt('W',this)">Wambui</button>
    <button class="chip" onclick="setFilt('med',this)">Medical</button>
    <button class="chip" onclick="setFilt('set',this)">Settlements</button>
    <button class="chip" onclick="setFilt('KES',this)">KES</button>
    <button class="chip" onclick="setFilt('USD',this)">USD</button>
  </div>
  <div class="elist" id="histList">
    <div class="loading-st"><div class="lspin"></div><div class="ltxt">Loading</div></div>
  </div>
  <button class="more-btn" id="moreBtn" style="display:none" onclick="moreHist()">Load more</button>
</div>

<!-- CONFIG MODAL -->
<div class="overlay" id="cfgModal">
  <div class="modal">
    <div class="m-title">Configuration</div>
    <p class="m-desc">No keys needed — everything is handled by your Cloudflare Worker. Just tap Save to confirm.</p>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeCfg()">Cancel</button>
      <button class="m-save" onclick="saveUrl()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const WORKER = 'https://notion-proxy.leandromrazevedo.workers.dev';
const SHEETS_WORKER = 'https://notion-proxy.leandromrazevedo.workers.dev/sheets';
const SHEET_ID = '1N1gKLfOAsnJ5JwWKY5cITmKrq772MnK9';
const SHEETS = { KES: 'Expenses KES', USD: 'Expenses USD' };

// State
let rows = { KES: [], USD: [] };
let paidBy = 'Leandro';
let isMed = false, isSet = false;
let filt = 'all', histPg = 0;
const PG = 20;

// Config — no key needed, Worker handles it
function openCfg() { document.getElementById('cfgModal').classList.add('open'); }
function closeCfg() { document.getElementById('cfgModal').classList.remove('open'); }
function saveUrl() {
  localStorage.setItem('configured', '1');
  document.getElementById('cfgBtn').classList.add('ok');
  closeCfg();
  loadAll();
}
if (localStorage.getItem('configured')) document.getElementById('cfgBtn').classList.add('ok');

// Nav
function goPage(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', ['dashboard','add','history'][i]===p));
  if (p==='history') renderHist();
}

// Sheets API via Worker
async function sheetsRead(sheetName) {
  const params = new URLSearchParams({ action: 'read', sheet: sheetName, id: SHEET_ID });
  const r = await fetch(`${SHEETS_WORKER}?${params}`, { method: 'GET' });
  if (!r.ok) throw new Error('Read error ' + r.status);
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  return data.values || [];
}

async function sheetsAppend(sheetName, row) {
  const params = new URLSearchParams({ action: 'append', sheet: sheetName, id: SHEET_ID });
  const r = await fetch(`${SHEETS_WORKER}?${params}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: [row] })
  });
  if (!r.ok) throw new Error('Write error ' + r.status);
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// Parse rows
function parseRows(raw, cur) {
  if (!raw) return [];
  return raw.filter(r => r[1] && r[7]).map(r => ({
    desc: r[1]||'', date: xlDate(r[6]),
    amount: parseFloat(r[7])||0, paidBy: r[8]||'',
    medical: String(r[9]||'').toLowerCase()==='yes',
    settlement: String(r[10]||'').toLowerCase()==='yes',
    type: r[11]||'', wShare: parseFloat(r[12])||0, lShare: parseFloat(r[13])||0,
    balW: parseFloat(r[14])||0, cur,
  }));
}

function xlDate(v) {
  if (!v && v !== 0) return null;
  const n = parseFloat(v);
  if (!isNaN(n) && n > 40000) return new Date((n-25569)*86400000).toISOString().split('T')[0];
  return String(v);
}
function toXl(iso) { return Math.round((new Date(iso) - new Date(1899,11,30)) / 86400000); }
function today() { return new Date().toISOString().split('T')[0]; }

// Load all
async function loadAll() {
  try {
    const [kRaw, uRaw] = await Promise.all([
      sheetsRead(SHEETS.KES),
      sheetsRead(SHEETS.USD),
    ]);
    rows.KES = parseRows(kRaw, 'KES');
    rows.USD = parseRows(uRaw, 'USD');
  } catch(e) {
    toast('Load failed: ' + e.message, 'err');
    return;
  }
  renderDash();
  if (document.getElementById('page-history').classList.contains('active')) renderHist();
}

// Balance
function getBalW(cur) {
  const r = rows[cur];
  for (let i = r.length-1; i >= 0; i--) {
    if (r[i].balW !== 0 || r[i].settlement) return r[i].balW;
  }
  return 0;
}

function renderDash() {
  renderBal('KES'); renderBal('USD'); renderSettle(); renderRecent();
}

function renderBal(cur) {
  const balW = getBalW(cur);
  const abs = Math.abs(balW);
  const amtEl = document.getElementById(cur.toLowerCase()+'-amt');
  const whoEl = document.getElementById(cur.toLowerCase()+'-who');
  amtEl.textContent = cur==='USD' ? abs.toFixed(2) : Math.round(abs).toLocaleString('en-KE');
  if (abs < 0.5) { whoEl.textContent='Settled ✓'; whoEl.className='bal-who ok'; }
  else if (balW < 0) { whoEl.textContent='Wambui owes Leandro'; whoEl.className='bal-who owes'; }
  else { whoEl.textContent='Leandro owes Wambui'; whoEl.className='bal-who owed'; }
}

function renderSettle() {
  const items = [];
  ['KES','USD'].forEach(cur => {
    const balW = getBalW(cur);
    const abs = Math.abs(balW);
    const threshold = cur==='USD' ? 0.5 : 1;
    if (abs > threshold) {
      const payer = balW < 0 ? 'Wambui' : 'Leandro';
      const payee = balW < 0 ? 'Leandro' : 'Wambui';
      const fmt = cur==='USD' ? '$'+abs.toFixed(2) : 'KES '+Math.round(abs).toLocaleString('en-KE');
      items.push({ cur, abs, payer, payee, fmt });
    }
  });
  const box = document.getElementById('settleBox');
  const opts = document.getElementById('settleOpts');
  if (!items.length) { box.classList.remove('show'); return; }
  box.classList.add('show');
  opts.innerHTML = items.map(it => `
    <div class="sopt" data-cur="${it.cur}" data-amt="${it.abs}" data-payer="${it.payer}" onclick="this.classList.toggle('on')">
      <div class="sopt-l"><div class="schk">✓</div><div class="sopt-txt">${it.payer} pays ${it.payee}</div></div>
      <div class="sopt-amt">${it.fmt}</div>
    </div>`).join('');
}

async function doSettle() {
  const checked = [...document.querySelectorAll('.sopt.on')];
  if (!checked.length) { toast('Select at least one currency', 'err'); return; }
  const btn = document.getElementById('settleBtn');
  btn.disabled = true;
  for (const opt of checked) {
    const cur = opt.dataset.cur;
    const amt = parseFloat(opt.dataset.amt);
    const payer = opt.dataset.payer;
    const nextNum = rows[cur].length + 1;
    const row = mkRow(nextNum, payer+' Settlement', today(), amt, payer, 'No', 'Yes', 'Transfer');
    try { await sheetsAppend(SHEETS[cur], row); }
    catch(e) { toast('Failed: '+e.message, 'err'); btn.disabled=false; return; }
  }
  toast('✓ Settlement logged', 'ok');
  await loadAll();
  btn.disabled = false;
}

function renderRecent() {
  const all = [...rows.KES,...rows.USD].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,10);
  const el = document.getElementById('recentList');
  document.getElementById('rcCount').textContent = all.length ? all.length+' shown' : '';
  el.innerHTML = all.length ? all.map(eHTML).join('') : '<div class="empty">No expenses yet</div>';
}

function eHTML(r) {
  const dot = r.settlement ? 'S' : (r.paidBy==='Leandro' ? 'L' : 'W');
  const dt = r.date ? new Date(r.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
  const sym = r.cur==='USD' ? '$' : 'KES ';
  const fmtAmt = r.cur==='USD' ? sym+r.amount.toFixed(2) : sym+Math.round(r.amount).toLocaleString('en-KE');
  const tags = [r.medical?'<span class="etag m">MED</span>':'', r.settlement?'<span class="etag s">SETTLE</span>':''].join('');
  return `<div class="eitem${r.settlement?' settle':''}">
    <div class="edot ${dot}"></div>
    <div class="ebody">
      <div class="edesc">${r.desc}</div>
      <div class="emeta"><span>${dt}</span><span>${r.paidBy}</span>${r.type?`<span>${r.type}</span>`:''}</div>
    </div>
    <div class="eright"><div class="eamt">${fmtAmt}</div>${tags}</div>
  </div>`;
}

// Form
function setPB(p) {
  paidBy = p;
  document.getElementById('pb-L').classList.toggle('on', p==='Leandro');
  document.getElementById('pb-W').classList.toggle('on', p==='Wambui');
  updSplit();
}

function togField(f) {
  if (f==='med') {
    isMed = !isMed;
    const t = document.getElementById('tog-med');
    t.classList.toggle('on', isMed);
    t.querySelector('.tog-lbl').textContent = isMed ? 'Yes — medical (90/10 split)' : 'No — standard 50/50 split';
    if (isMed) { isSet=false; document.getElementById('tog-set').classList.remove('on'); document.getElementById('tog-set').querySelector('.tog-lbl').textContent='No'; }
  } else {
    isSet = !isSet;
    const t = document.getElementById('tog-set');
    t.classList.toggle('on', isSet);
    t.querySelector('.tog-lbl').textContent = isSet ? 'Yes — settlement row' : 'No';
    if (isSet) { isMed=false; document.getElementById('tog-med').classList.remove('on'); document.getElementById('tog-med').querySelector('.tog-lbl').textContent='No — standard 50/50 split'; }
  }
  updSplit();
}

function updSplit() {
  let w, l;
  if (isSet) { w='—'; l='—'; }
  else if (isMed) { w = paidBy==='Leandro'?'90%':'0%'; l = paidBy==='Wambui'?'90%':'0%'; }
  else { w = paidBy==='Leandro'?'50%':'0%'; l = paidBy==='Wambui'?'50%':'0%'; }
  document.getElementById('sp-w').textContent = w;
  document.getElementById('sp-l').textContent = l;
}

function mkRow(num, desc, dateISO, amount, pb, medical, settlement, type) {
  return [num, desc, '','','','', toXl(dateISO), amount, pb, medical, settlement, type, '','','','',''];
}

async function submitExp() {
  const desc = document.getElementById('f-desc').value.trim();
  const date = document.getElementById('f-date').value;
  const amt = parseFloat(document.getElementById('f-amt').value);
  const cur = document.getElementById('f-cur').value;
  const type = document.getElementById('f-type').value;
  if (!desc) { toast('Description required','err'); return; }
  if (!date) { toast('Date required','err'); return; }
  if (!amt || amt <= 0) { toast('Valid amount required','err'); return; }
  const nextNum = rows[cur].filter(r=>!r.settlement).length + 1;
  const row = mkRow(nextNum, desc, date, amt, paidBy, isMed?'Yes':'No', isSet?'Yes':'No', type);
  const btn = document.getElementById('subBtn');
  btn.disabled=true; btn.classList.add('loading');
  try {
    await sheetsAppend(SHEETS[cur], row);
    toast('✓ Expense added','ok');
    resetForm(); await loadAll(); goPage('dashboard');
  } catch(e) { toast(e.message||'Failed','err'); }
  btn.disabled=false; btn.classList.remove('loading');
}

function resetForm() {
  document.getElementById('f-desc').value='';
  document.getElementById('f-amt').value='';
  document.getElementById('f-date').value=today();
  document.getElementById('f-cur').value='KES';
  isMed=false; isSet=false; paidBy='Leandro';
  document.getElementById('pb-L').classList.add('on');
  document.getElementById('pb-W').classList.remove('on');
  document.getElementById('tog-med').classList.remove('on');
  document.getElementById('tog-med').querySelector('.tog-lbl').textContent='No — standard 50/50 split';
  document.getElementById('tog-set').classList.remove('on');
  document.getElementById('tog-set').querySelector('.tog-lbl').textContent='No';
  updSplit();
}

// History
function setFilt(f, el) {
  filt=f; histPg=0;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on'); renderHist();
}
function getFilt() {
  const all = [...rows.KES,...rows.USD].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if (filt==='all') return all;
  if (filt==='L') return all.filter(r=>r.paidBy==='Leandro');
  if (filt==='W') return all.filter(r=>r.paidBy==='Wambui');
  if (filt==='med') return all.filter(r=>r.medical);
  if (filt==='set') return all.filter(r=>r.settlement);
  if (filt==='KES') return all.filter(r=>r.cur==='KES');
  if (filt==='USD') return all.filter(r=>r.cur==='USD');
  return all;
}
function moreHist() { histPg++; renderHist(); }
function renderHist() {
  const filtered = getFilt();
  const visible = filtered.slice(0,(histPg+1)*PG);
  const el = document.getElementById('histList');
  const more = document.getElementById('moreBtn');
  el.innerHTML = visible.length ? visible.map(eHTML).join('') : '<div class="empty">No expenses match this filter</div>';
  more.style.display = filtered.length > visible.length ? 'block' : 'none';
}

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  setTimeout(()=>t.className='toast', 2800);
}

// Init
document.getElementById('f-date').value = today();
updSplit();
loadAll();
</script>
</body>
</html>
